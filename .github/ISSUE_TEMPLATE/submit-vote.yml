name: "Share Your Experience"
description: "Would you work with this person again? Share your honest experience."
title: "Vote Submission"
labels: ["vote"]
body:
  - type: markdown
    attributes:
      value: |
        ## Share Your Professional Experience

        This is a simple, honest reflection — would you choose to work with this person again?

        Your response is public, permanent, and tied to your GitHub username.

        **First-time here?** Your first submission must be a positive one. You need to vouch for someone before you can flag someone. This keeps the community constructive.

  - type: input
    id: linkedin_url
    attributes:
      label: LinkedIn Profile URL
      description: "Paste the full LinkedIn profile link of the person."
      placeholder: "https://www.linkedin.com/in/jane-doe"
    validations:
      required: true

  - type: dropdown
    id: vote
    attributes:
      label: "Based on your experience, would you work with/for them again?"
      options:
        - "Yes"
        - "No"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Brief Reason (optional)
      description: "A short note about your experience. Keep it professional and constructive."
      placeholder: "Great collaborator, reliable and communicative."
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: I understand
      options:
        - label: "This is based on my genuine professional experience. I understand my vote is public, permanent, and cannot be edited."
          required: true
