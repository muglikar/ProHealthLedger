name: "Request Profile Removal"
description: "Request removal of your profile from the ledger (Right to be Forgotten)."
title: "Removal Request"
labels: ["deactivation"]
body:
  - type: markdown
    attributes:
      value: |
        ## Profile Removal Request

        If you are the subject of a profile on this ledger and wish to have it removed, submit this form.

        We respect the right to be forgotten. Your profile data will be removed from the active ledger. Note that prior versions may exist in public web archives — we cannot control third-party archival services.

  - type: input
    id: linkedin_url
    attributes:
      label: Your LinkedIn Profile URL
      description: "The LinkedIn profile that appears on the ledger."
      placeholder: "https://www.linkedin.com/in/your-name"
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: How can we verify you are the profile owner?
      description: "To prevent abuse, briefly explain how we can confirm this is your profile. For example, message us from the LinkedIn account."
      placeholder: "I will send a LinkedIn message from this profile to confirm."
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: "I am the owner of this LinkedIn profile and I request its removal from the Professional Health Ledger."
          required: true
