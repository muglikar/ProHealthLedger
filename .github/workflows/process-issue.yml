name: Legacy Vote Issue Acknowledger

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  acknowledge-legacy-vote:
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge legacy vote-style issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = String(issue?.body || "");
            const isWebsiteRecord = body.includes("pre-validated (Karma Rule checked");
            const looksLikeLegacyVote =
              /LinkedIn Profile URL/i.test(body) &&
              /would you work with\/for them again/i.test(body);

            // Website-submitted records are already authoritative and closed by the API.
            if (isWebsiteRecord || !looksLikeLegacyVote) {
              core.info("Not a legacy vote issue; no action taken.");
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                "Thanks for sharing your experience.",
                "",
                "This GitHub issue-based vote flow has been retired for security and data-integrity reasons.",
                "Please submit your vote via the website form instead:",
                "",
                "- https://prohealthledger.org/submit",
                "",
                "This issue is being closed automatically to keep the ledger single-source-of-truth.",
              ].join("\\n"),
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: "closed",
              state_reason: "not_planned",
            });
