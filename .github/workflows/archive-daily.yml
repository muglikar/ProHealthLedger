name: Daily Archive to Wayback Machine

on:
  schedule:
    # Run every day at 00:00 UTC
    - cron: '0 0 * * *'
permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Run Archival Script
      run: node scripts/archive_to_wayback.js

    - name: Log Success
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: node scripts/log_system_activity.js --activity="daily_archival" --status="success" --details="Successfully archived profiles and platform pages to the Wayback Machine & Archive.is."

    - name: Log Failure
      if: failure()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: node scripts/log_system_activity.js --activity="daily_archival" --status="failure" --details="Daily archiving workflow run failed."
